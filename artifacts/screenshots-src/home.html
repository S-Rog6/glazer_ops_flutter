<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=412, initial-scale=1" />
  <title>GlazerOps – Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
</head>
<body>

<!-- App Bar -->
<div class="app-bar">
  <span class="app-bar-title">Dashboard</span>
  <div class="app-bar-actions">
    <button class="icon-btn">⋮</button>
  </div>
</div>

<!-- Page Body -->
<div class="page-body">

  <!-- Today's Jobs -->
  <div class="card-panel">
    <div style="display:flex;align-items:center;margin-bottom:var(--pad-lg);">
      <span class="panel-title" style="margin-bottom:0;">Today's Jobs</span>
    </div>
    <!-- Filters -->
    <div class="filters-row">
      <div class="search-wrap">
        <span class="search-icon" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--on-surface-variant);">🔍</span>
        <input class="search-input" type="text" placeholder="Search by job name, PO, or site" readonly />
      </div>
      <select class="status-select">
        <option>All</option>
        <option>Open</option>
        <option>In Progress</option>
      </select>
      <span class="filter-count">1 of 1 jobs</span>
    </div>

    <!-- Job Card: Civic Center Lobby (In Progress – today) -->
    <div class="job-card">
      <div class="status-bar status-bar-inprogress"></div>
      <div class="job-card-inner">
        <div class="job-title">Civic Center Lobby</div>
        <div class="job-pills">
          <span class="pill pill-meta"><span class="pill-icon">🏷</span> PO 33445</span>
          <span class="pill pill-status-inprogress">In Progress</span>
        </div>
        <div class="location-panel">
          <div class="location-label">📍 Address</div>
          <div class="location-value">Civic Center</div>
        </div>
        <div class="card-actions">
          <button class="btn-filled">↗ Open Job</button>
          <button class="btn-outlined">📌 Pin</button>
          <button class="btn-outlined">📝 Add Note</button>
          <button class="btn-outlined">📷 Add Photo</button>
        </div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Pinned Jobs -->
  <div class="card-panel">
    <div style="display:flex;align-items:center;margin-bottom:var(--pad-lg);">
      <span class="panel-title" style="margin-bottom:0;">Pinned</span>
    </div>
    <!-- Filters -->
    <div class="filters-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search by job name, PO, or site" readonly />
      </div>
      <select class="status-select">
        <option>All</option>
      </select>
      <span class="filter-count">2 of 2 jobs</span>
    </div>

    <!-- Job Card: Tampa Highrise (Open) -->
    <div class="job-card">
      <div class="status-bar status-bar-open"></div>
      <div class="job-card-inner">
        <div class="job-title">Tampa Highrise</div>
        <div class="job-pills">
          <span class="pill pill-meta"><span class="pill-icon">🏷</span> PO 12345</span>
          <span class="pill pill-status-open">Open</span>
        </div>
        <div class="location-panel">
          <div class="location-label">📍 Address</div>
          <div class="location-value">Downtown Tower</div>
        </div>
        <div class="card-actions">
          <button class="btn-filled">↗ Open Job</button>
          <button class="btn-outlined">📌 Pin</button>
          <button class="btn-outlined">📝 Add Note</button>
        </div>
      </div>
    </div>

    <!-- Job Card: Airport Retrofit (Open) -->
    <div class="job-card">
      <div class="status-bar status-bar-open"></div>
      <div class="job-card-inner">
        <div class="job-title">Airport Retrofit</div>
        <div class="job-pills">
          <span class="pill pill-meta"><span class="pill-icon">🏷</span> PO 24680</span>
          <span class="pill pill-status-open">Open</span>
        </div>
        <div class="location-panel">
          <div class="location-label">📍 Address</div>
          <div class="location-value">Terminal B</div>
        </div>
        <div class="card-actions">
          <button class="btn-filled">↗ Open Job</button>
          <button class="btn-outlined">📌 Pin</button>
          <button class="btn-outlined">📝 Add Note</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Bottom Navigation -->
<div class="bottom-nav-wrapper">
  <div class="logo-strip">
    <span class="logo-text">⬜ GLAZEROPS</span>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active">
      <div class="nav-icon">🏠</div>
      <span class="nav-label">Dashboard</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">💼</div>
      <span class="nav-label">Jobs</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📅</div>
      <span class="nav-label">Schedule</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">👥</div>
      <span class="nav-label">Contacts</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📝</div>
      <span class="nav-label">Notes</span>
    </div>
  </div>
</div>

</body>
</html>
