<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=412, initial-scale=1" />
  <title>GlazerOps – Settings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- App Bar -->
<div class="app-bar">
  <span class="app-bar-title">Settings</span>
</div>

<!-- Page Body -->
<div class="page-body">

  <!-- Theme Card -->
  <div class="settings-card">
    <div class="settings-item">
      <div>
        <div class="settings-label">Theme</div>
        <div class="settings-sublabel">Dark mode</div>
      </div>
    </div>
    <div class="settings-item">
      <div>
        <div class="settings-label">Use dark theme</div>
      </div>
      <div class="toggle">
        <div class="toggle-thumb"></div>
      </div>
    </div>
  </div>

  <div style="height:12px;"></div>

  <!-- Other settings (list tiles) -->
  <div class="settings-card">
    <div class="list-tile">🔔 Notifications</div>
    <div class="list-tile">ℹ️ About</div>
  </div>

</div>

<!-- Bottom Navigation -->
<div class="bottom-nav-wrapper">
  <div class="logo-strip">
    <span class="logo-text">⬜ GLAZEROPS</span>
  </div>
  <div class="bottom-nav">
    <div class="nav-item">
      <div class="nav-icon">🏠</div>
      <span class="nav-label">Dashboard</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">💼</div>
      <span class="nav-label">Jobs</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📅</div>
      <span class="nav-label">Schedule</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">👥</div>
      <span class="nav-label">Contacts</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📝</div>
      <span class="nav-label">Notes</span>
    </div>
  </div>
</div>

</body>
</html>
